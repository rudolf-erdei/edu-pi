{% extends "admin/index.html" %}
{% load i18n %}

{% block content %}
<div id="content-main" style="margin-bottom: 30px;">
    <!-- Plugin Dashboard Link -->
    <div class="module" style="background: #f8f9fa; border-left: 4px solid #007bff; margin-bottom: 20px; padding: 15px; border-radius: 4px;">
        <h2 style="margin-top: 0;">🔧 Plugin Management</h2>
        <p>Manage your installed plugins, view their status, and configure settings.</p>
        <a href="{% url 'plugin_dashboard' %}" 
           class="button" 
           style="background: #007bff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; display: inline-block;">
            View Installed Plugins →
        </a>
    </div>
</div>

{{ block.super }}
{% endblock %}
