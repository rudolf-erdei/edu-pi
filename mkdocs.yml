# Project Information
site_name: Tinko Documentation
site_description: Official documentation for Tinko - the open-source educational Raspberry Pi platform for interactive classroom activities.
site_author: Erdei Rudolf

# Repository Integration
repo_name: rudolf-erdei/edu-pi
repo_url: https://github.com/rudolf-erdei/edu-pi

# Theme Configuration
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

# Page Navigation Structure
nav:
  - Home: index.md
  
  - Teacher Guide:
    - Getting Started:
      - Overview: teacher/overview.md
      - Installation: teacher/installation.md
      - First Steps: teacher/first-steps.md
    - Using Tinko:
      - Dashboard: teacher/dashboard.md
      - Settings: teacher/settings.md
      - Background Activities: teacher/background-activities.md
    - Plugins:
      - Activity Timer: teacher/plugins/activity-timer.md
      - Noise Monitor: teacher/plugins/noise-monitor.md
      - Routines: teacher/plugins/routines.md
      - Touch Piano: teacher/plugins/touch-piano.md
  
  - Developer Guide:
    - Getting Started:
      - Developer Setup: developer/setup.md
      - Project Structure: developer/structure.md
    - Hardware:
      - Requirements: developer/hardware/requirements.md
      - GPIO Pin Assignments: developer/hardware/gpio-pins.md
      - Wiring Diagrams: developer/hardware/wiring.md
    - Plugin Development:
      - Plugin Tutorial: developer/plugins/tutorial.md
      - Plugin API: developer/plugins/api.md
      - Best Practices: developer/plugins/best-practices.md
    - Advanced Topics:
      - WebSocket Integration: developer/websocket.md
      - Translations: developer/translations.md
      - Testing: developer/testing.md
      - Contributing: developer/contributing.md
  
  - Reference:
    - Configuration: reference/configuration.md
    - API Endpoints: reference/api.md
    - Troubleshooting: reference/troubleshooting.md

# Extra Configuration
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rudolf-erdei/edu-pi


# Markdown Extensions
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
